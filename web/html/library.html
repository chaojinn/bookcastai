<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/library.css">
</head>
<body>
  <div id="content">
    <div class="grid" id="pod-grid"></div>
    <div class="empty" id="empty-state" style="display:none;">No podcasts found.</div>
  </div>

  <!-- Delete confirmation modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title" id="deleteModalLabel">Delete book</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Delete <strong id="deleteModalTitle"></strong>?</p>
          <p class="text-muted small mb-0">This will permanently remove all files and audio. This cannot be undone.</p>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="deleteModalConfirm">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"  crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"  crossorigin="anonymous"></script>
  <script src="/js/main.js"></script>
  <script>
    async function recordLocation() {
      const uri = `${window.location.pathname}${window.location.search}`;
      try {
        await fetchWithRefresh('/api/last_location', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uri })
        });
      } catch (err) {
        console.warn('Failed to record last location', err);
      }
    }

    async function loadPods() {
      const grid = document.getElementById('pod-grid');
      const empty = document.getElementById('empty-state');
      grid.innerHTML = '';
      empty.style.display = 'none';
      try {
        const res = await fetchWithRefresh('/api/get_pods');
        if (!res.ok) throw new Error('Request failed');
        const pods = await res.json();
        if (!pods || pods.length === 0) {
          empty.style.display = 'block';
          return;
        }
        console.log(pods);
        pods.forEach(pod => {
          const card = document.createElement('div');
          card.className = 'card';
          const cover = document.createElement('div');
          cover.className = 'cover';
          cover.style.backgroundImage = pod.image_url ? `url("${pod.image_url}")` : 'none';
          const title = document.createElement('a');
          title.className = 'title text-center';
          title.href = `/pod_episodes.html?pod_id=${encodeURIComponent(pod.id)}`;
          title.textContent = pod.title || 'Untitled';
          card.appendChild(cover);
          card.appendChild(title);
          if (pod.is_owner) {
            const corner = document.createElement('div');
            corner.className = 'card-delete-corner';
            const btn = document.createElement('button');
            btn.className = 'card-delete-btn';
            btn.innerHTML = '<i class="bi bi-trash3"></i>';
            btn.title = 'Delete book';
            btn.dataset.bookId = pod.book_id;
            btn.dataset.bookTitle = pod.title || 'Untitled';
            corner.appendChild(btn);
            card.appendChild(corner);
          }
          grid.appendChild(card);
        });
      } catch (err) {
        empty.style.display = 'block';
        empty.textContent = 'Failed to load podcasts.';
      }
    }

    let _pendingDeleteBtn = null;

    function deleteBook(btn) {
      _pendingDeleteBtn = btn;
      document.getElementById('deleteModalTitle').textContent = btn.dataset.bookTitle;
      bootstrap.Modal.getOrCreateInstance(document.getElementById('deleteModal')).show();
    }

    async function confirmDelete() {
      const btn = _pendingDeleteBtn;
      if (!btn) return;
      _pendingDeleteBtn = null;
      bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
      btn.disabled = true;
      const bookId = btn.dataset.bookId;
      try {
        const res = await fetchWithRefresh(`/api/book/${encodeURIComponent(bookId)}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        const card = btn.closest('.card');
        card.remove();
        const grid = document.getElementById('pod-grid');
        if (grid.children.length === 0) {
          const empty = document.getElementById('empty-state');
          empty.textContent = 'No podcasts found.';
          empty.style.display = 'block';
        }
      } catch (err) {
        console.warn('Failed to delete book', err);
        btn.disabled = false;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      recordLocation();
      loadPods();
      document.getElementById('pod-grid').addEventListener('click', e => {
        const btn = e.target.closest('.card-delete-btn');
        if (btn) {
          e.preventDefault();
          deleteBook(btn);
        }
      });
      document.getElementById('deleteModalConfirm').addEventListener('click', confirmDelete);
    });
  </script>
</body>
</html>
